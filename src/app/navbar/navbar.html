<div class="d-flex vh-100">
  <!-- Sidebar -->
  <div class="bg-dark text-white d-flex flex-column sidebar" [ngClass]="{'sidebar-open': isSidebarOpen, 'sidebar-closed': !isSidebarOpen}" style="min-height: 100vh;">
    <div class="p-3 flex-grow-1">
      <h5 class="text-center">HR Dashboard</h5>
      <ul class="nav flex-column">
        <li class="nav-item">
          <a class="nav-link text-white" routerLink="employee" routerLinkActive="active">
            <i class="fa fa-users mr-2"></i> Employees
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-white" routerLink="balance" routerLinkActive="active">
            <i class="fa fa-calendar mr-2"></i> Leave Balance
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-white" routerLink="leave" routerLinkActive="active">
            <i class="fa fa-file-text mr-2"></i> Leave Requests
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-white" routerLink="admin" routerLinkActive="active">
            <i class="fa fa-cog mr-2"></i> Admin
          </a>
        </li>
      </ul>
    </div>
    <div class="p-3">
      <button class="btn btn-outline-danger w-100" (click)="logout()">
        <i class="fa fa-sign-out"></i> Logout
      </button>
      <span>{{employeeObject.userName}}</span>
    </div>
  </div>

  <!-- Main Content -->
  <div class="flex-grow-1 d-flex flex-column">
    <!-- Top Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
      <button class="btn btn-outline-secondary mr-3" (click)="toggleSidebar()">
        <i class="fa fa-bars"></i>
      </button>
      <span class="navbar-brand mb-0 h1">HR Management System</span>
    </nav>

    <!-- Page Content -->
    <div class="flex-grow-1 p-3 overflow-auto">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
