<div class="container mt-4">
  <div class="row g-4">

    <!-- LEFT SIDE -->
    <div class="col-md-7">
      <div class="card shadow-sm h-100">

        <!-- Header -->
        <div class="card-header header-bg d-flex justify-content-between align-items-center">
          <div>
            <h6 class="mb-0">Leave Balance</h6>
            <small class="text-light">Manage requests</small>
          </div>

          <button class="btn btn-sm btn-light"
                  (click)="getBalance(this.leaveData.empId || 0)">
            <i class="fa fa-refresh me-1"></i> Refresh
          </button>
        </div>

        <!-- Table -->
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-dark text-center">
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Leave Type</th>
                <th>Count</th>
                <th>Updated</th>
                <th>Updated By</th>
              </tr>
            </thead>

            <tbody class="text-center">
              @for (item of employeeLeaveBalance; track item.balanceId) {
                <tr>
                  <td>{{ item.balanceId }}</td>
                  <td>{{ item.empName }}</td>
                  <td>
                    <span class="badge bg-info text-dark">
                      {{ item.leaveType }}
                    </span>
                  </td>
                  <td>
                    <span class="fw-bold">{{ item.count }}</span>
                  </td>
                  <td>{{ item.updatedDate | date:'dd-MM-yyyy' }}</td>
                  <td>{{ item.updateBy }}</td>
                </tr>
              }
            </tbody>
          </table>
        </div>

      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="col-md-5">
      <div class="card shadow-sm h-100">

        <!-- Header -->
        <div class="card-header header-bg">
          <h6 class="mb-0">Request Form</h6>
        </div>

        <!-- Form -->
        <div class="card-body">
          <form (ngSubmit)="onRequest()" #formRef="ngForm">

            <!-- From -->
            <div class="mb-3">
              <label class="form-label">From</label>
              <input type="date"
                     class="form-control"
                     [(ngModel)]="leaveData.fromDate"
                     name="fromDate"
                     required>
            </div>

            <!-- To -->
            <div class="mb-3">
              <label class="form-label">To</label>
              <input type="date"
                     class="form-control"
                     [(ngModel)]="leaveData.toDate"
                     name="toDate"
                     required>
            </div>

            <!-- Leave Type -->
            <div class="mb-3">
              <label class="form-label">Leave Type</label>
              <select class="form-select"
                      [(ngModel)]="leaveData.leaveType"
                      name="leaveType"
                      required>
                <option value="">Select Leave Type</option>
                <option value="sickLeave">Sick Leave</option>
                <option value="paidLeave">Paid Leave</option>
              </select>
            </div>

            <!-- Reason -->
            <div class="mb-3">
              <label class="form-label">Reason</label>
              <textarea class="form-control"
                        rows="3"
                        [(ngModel)]="leaveData.reason"
                        name="reason"></textarea>
            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-end gap-2">
              <button class="btn btn-primary" type="submit">
                <i class="fa fa-paper-plane me-1"></i> Submit
              </button>

              <button type="reset" class="btn btn-secondary">
                Reset
              </button>

              <button type="button" class="btn btn-outline-danger">
                Cancel
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>

  </div>
</div>
