<div>
  <button type="button" (click)="getAllLeaveBalance()">
    Refresh Leave Balance
  </button>
</div>

<div class="container-fluid py-4 bg-light">
  <div class="row g-3">

    @for (employee of AllLeaveBalanceObj; track employee.empId) {

      <div class="col-md-6">
        <div class="card border-0 shadow-lg rounded-4 h-100 hover-card">
          <div class="card-body">

            <div class="d-flex justify-content-between align-items-start mb-3">

              <div>
                <h5 class="card-title fw-semibold">
                  <i class="bi bi-heart-pulse text-danger me-2"></i>
                  {{ employee.leaveType }}
                </h5>

                <p class="text-muted small mb-0">
                  <i class="bi bi-person me-1"></i>
                  {{ employee.empName }} (ID: {{ employee.empId }})
                </p>
              </div>

              <span class="badge bg-info-subtle text-info fw-semibold px-3 py-2 rounded-pill">
                <i class="bi bi-hourglass-split me-1"></i>
                {{ employee.count }} Remaining
              </span>

            </div>

            <div class="mb-3 text-muted small">

              <div>
                <i class="bi bi-clock-history me-1"></i>
                <strong>Last updated:</strong>
                {{ employee.updatedDate | date: 'dd-MM-yyyy' }}
              </div>

              <div>
                <i class="bi bi-person-check me-1"></i>
                <strong>Updated by:</strong>
                {{ employee.updateBy }}
              </div>

            </div>

            <div class="d-flex gap-2">

              <button class="btn btn-sm btn-outline-primary rounded-pill">
                <i class="bi bi-eye"></i>
              </button>

              <button
                class="btn btn-sm btn-outline-secondary rounded-pill"
                (click)="onEdit(employee)">
                <i class="bi bi-pencil"></i>
              </button>

              <button class="btn btn-sm btn-outline-danger rounded-pill">
                <i class="bi bi-trash"></i>
              </button>

            </div>

          </div>
        </div>
      </div>

    }

    <app-edit-leave-balance
      *ngIf="isEditOpen"
      [employee]="selectedEmployee"
      (close)="isEditOpen = false"
      (updated)="getAllLeaveBalance()">
    </app-edit-leave-balance>

  </div>
</div>
